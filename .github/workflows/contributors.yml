name: Update Contributors

on:
  push:
    branches:
      - main

jobs:
  contributors:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: BobAnkh/add-contributors@master
        with:
          REPO_NAME: MILAN-123865/GitDeep
          CONTRIBUTOR: all
          ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
